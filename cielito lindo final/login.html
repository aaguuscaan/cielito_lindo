<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingresar — Cielito Lindo</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏡</text></svg>">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: linear-gradient(135deg, var(--wood-dark) 0%, var(--olive) 100%);
      opacity: .08;
      z-index: -1;
    }
    .login-page-bg {
      position: fixed; inset: 0; z-index: -2;
      background: url('https://images.unsplash.com/photo-1470770841072-f978cf4d019e?w=1400&q=80') center/cover;
      filter: blur(4px) brightness(.4);
    }
    .login-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow-lg);
      margin: 1.5rem;
    }
    [data-theme="dark"] .login-card { background: var(--cream); }
    .login-logo {
      font-family: var(--font-display);
      font-size: 1.8rem;
      color: var(--wood-dark);
      text-align: center;
      margin-bottom: .3rem;
    }
    [data-theme="dark"] .login-logo { color: var(--sand); }
    .login-subtitle {
      text-align: center;
      font-size: .85rem;
      color: var(--gray);
      margin-bottom: 2rem;
    }
    .login-back {
      display: block;
      text-align: center;
      margin-top: 1.5rem;
      font-size: .85rem;
      color: var(--gray);
      transition: color var(--transition);
    }
    .login-back:hover { color: var(--wood); }
  </style>
</head>
<body>
  <div class="login-page-bg"></div>
  <div id="toast-container"></div>

  <div class="login-card">
    <div class="login-logo">Cielito Lindo</div>
    <div class="login-subtitle">Ingresá para gestionar tus reservas</div>

    <div class="modal-tabs">
      <button class="modal-tab active" onclick="switchTab('login', this)">Ingresar</button>
      <button class="modal-tab" onclick="switchTab('register', this)">Registrarse</button>
    </div>

    <!-- Login -->
    <div class="modal-tab-content active" id="tab-login">
      <button class="btn-google" onclick="loginGoogle()">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Continuar con Google
      </button>
      <div class="divider-or">o con email</div>
      <div class="form-field">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" id="l-email" placeholder="tu@email.com" autocomplete="email">
      </div>
      <div class="form-field">
        <label class="form-label">Contraseña</label>
        <input type="password" class="form-input" id="l-pass" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn-submit" onclick="doLogin()">Ingresar</button>
    </div>

    <!-- Register -->
    <div class="modal-tab-content" id="tab-register">
      <div class="form-field">
        <label class="form-label">Nombre completo</label>
        <input type="text" class="form-input" id="r-name" placeholder="Tu nombre" autocomplete="name">
      </div>
      <div class="form-field">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" id="r-email" placeholder="tu@email.com" autocomplete="email">
      </div>
      <div class="form-field">
        <label class="form-label">Teléfono</label>
        <input type="tel" class="form-input" id="r-phone" placeholder="+54 9 ..." autocomplete="tel">
      </div>
      <div class="form-field">
        <label class="form-label">Contraseña</label>
        <input type="password" class="form-input" id="r-pass" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
      </div>
      <button class="btn-submit" onclick="doRegister()">Crear cuenta</button>
    </div>

    <a href="index.html" class="login-back">← Volver al sitio</a>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Redirect if already logged in
    Auth.init((user, role) => {
      if (user) {
        const redirect = new URLSearchParams(location.search).get('redirect') || 'index.html';
        window.location.href = redirect;
      }
    });

    function switchTab(tab, btn) {
      document.querySelectorAll('.modal-tab').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.modal-tab-content').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(`tab-${tab}`)?.classList.add('active');
    }

    async function doLogin() {
      const email = document.getElementById('l-email').value.trim();
      const pass = document.getElementById('l-pass').value;
      if (!email || !pass) { Toast.show('Completá los campos', 'warning'); return; }
      const r = await Auth.login(email, pass);
      if (r.ok) window.location.href = new URLSearchParams(location.search).get('redirect') || 'index.html';
    }

    async function doRegister() {
      const nombre = document.getElementById('r-name').value.trim();
      const email = document.getElementById('r-email').value.trim();
      const telefono = document.getElementById('r-phone').value.trim();
      const pass = document.getElementById('r-pass').value;
      if (!nombre || !email || !pass) { Toast.show('Completá los campos obligatorios', 'warning'); return; }
      const r = await Auth.register({ nombre, email, telefono, password: pass });
      if (r.ok) window.location.href = 'index.html';
    }

    async function loginGoogle() {
      const r = await Auth.loginWithGoogle();
      if (r.ok) window.location.href = 'index.html';
    }

    document.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      const active = document.querySelector('.modal-tab-content.active');
      if (active?.id === 'tab-login') doLogin();
      if (active?.id === 'tab-register') doRegister();
    });

    // Theme
    const t = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', t);
  </script>
</body>
</html>
